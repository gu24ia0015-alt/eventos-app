{% extends "base.html" %}

{% block content %}
<section class="container">
    <div class="card-formulario">
        <h2>✏️ Editar Evento</h2>
        <form action="{{ url_for('editar_evento', id=evento.id) }}" method="POST">
            <div class="form-group">
                <label>Nombre del Evento:</label>
                <input type="text" name="nombre" value="{{ evento.nombre }}" required>
            </div>
            <div class="form-group">
                <label>Tipo de Evento:</label>
                <select name="tipo">
                    <option value="Boda" {% if evento.tipo == 'Boda' %}selected{% endif %}>Boda</option>
                    <option value="Cumpleanos" {% if evento.tipo == 'Cumpleanos' %}selected{% endif %}>Cumpleaños</option>
                    <option value="Graduacion" {% if evento.tipo == 'Graduacion' %}selected{% endif %}>Graduación</option>
                    <option value="Corporativo" {% if evento.tipo == 'Corporativo' %}selected{% endif %}>Corporativo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" name="fecha" value="{{ evento.fecha }}" required>
            </div>
            <div class="form-group">
                <label>Número de Personas:</label>
                <input type="number" name="personas" value="{{ evento.personas }}" required>
            </div>
            <div class="form-group">
                <label>Decoración:</label>
                <select name="decoracion">
                    <option value="Floral" {% if evento.decoracion == 'Floral' %}selected{% endif %}>Floral</option>
                    <option value="Elegante" {% if evento.decoracion == 'Elegante' %}selected{% endif %}>Elegante</option>
                    <option value="Globos" {% if evento.decoracion == 'Globos' %}selected{% endif %}>Globos</option>
                    <option value="Minimalista" {% if evento.decoracion == 'Minimalista' %}selected{% endif %}>Minimalista</option>
                </select>
            </div>
            <button type="submit" class="btn-principal">Actualizar Cambios</button>
            <a href="{{ url_for('eventos') }}" class="btn-cancelar">Volver</a>
        </form>
    </div>
</section>
{% endblock %}
